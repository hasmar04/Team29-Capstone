name: Build and Release Executables

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the release version (e.g., v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          pip install -r requirements.txt

          # Replace GPU torch with CPU-only torch
          pip uninstall -y torch torchvision torchaudio || true
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

          pip install pyinstaller

      - name: Clean previous builds
        shell: bash
        run: |
          rm -rf build dist *.spec

      - name: Build executable
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then

            pyinstaller run_gui.py \
              --onedir \
              --name app \
              --add-data "models;models" \
              --hidden-import scipy._lib.array_api_compat.numpy.fft \
              --hidden-import sklearn.cluster \
              --exclude-module tensorflow \
              --exclude-module jax \
              --exclude-module cupy \
              --exclude-module IPython \
              --exclude-module pandas.tests \
              --exclude-module matplotlib.tests

          else

            pyinstaller run_gui.py \
              --onedir \
              --name app \
              --add-data "models:models" \
              --hidden-import scipy._lib.array_api_compat.numpy.fft \
              --hidden-import sklearn.cluster \
              --exclude-module tensorflow \
              --exclude-module jax \
              --exclude-module cupy \
              --exclude-module IPython \
              --exclude-module pandas.tests \
              --exclude-module matplotlib.tests

          fi

      - name: Rename output folder
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/app dist/app-windows
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/app dist/app-linux
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/app dist/app-macos
          fi

      - name: Zip build
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            powershell Compress-Archive dist/app-windows app-windows.zip

          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            cd dist
            zip -r ../app-linux.zip app-linux

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            cd dist
            zip -r ../app-macos.zip app-macos
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: |
            *.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            app-windows.zip
            app-linux.zip
            app-macos.zip
